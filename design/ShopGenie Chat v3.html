<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ShopGenie · 商店精灵</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root {
  --bg: #F0EDE8;
  --sidebar: #FFFFFF;
  --surface: #FFFFFF;
  --border: #E0DBD5;
  --border-sub: #EBE8E3;
  --text-1: #111110;
  --text-2: #6B6560;
  --text-3: #A8A39E;
  --ink: #111110;
  --ink-hover: #333330;
  --xhs: #FF2442;
  --xhs-lt: #FFF2F4;
  --xhs-bd: #FFC8D2;
  --dy: #0D0D0D;
  --dy-lt: #F0F0F0;
  --dy-bd: #D8D8D8;
  --r-xs:3px;--r-sm:6px;--r:10px;--r-lg:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;overflow:hidden;}
body{font-family:'DM Sans','Noto Sans SC',-apple-system,sans-serif;background:var(--bg);color:var(--text-1);-webkit-font-smoothing:antialiased;}

/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:252px;flex-shrink:0;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sb-logo{padding:20px 18px 16px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border-sub);}
.sb-logo-mark{flex-shrink:0;display:flex;color:var(--ink);}
.sb-logo-name{font-family:'Instrument Serif',serif;font-size:16px;color:var(--text-1);letter-spacing:-.2px;line-height:1;}
.sb-logo-sub{font-size:10px;color:var(--text-3);letter-spacing:.3px;margin-top:1px;font-family:'DM Sans',sans-serif;}
.sb-new{margin:12px 12px 4px;padding:7px 12px;border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text-2);font-size:12.5px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .15s;font-family:inherit;background:transparent;}
.sb-new:hover{background:var(--bg);color:var(--text-1);border-color:var(--text-3);}
.sb-convs{flex:1;overflow-y:auto;padding-bottom:8px;}
.sb-convs::-webkit-scrollbar{width:2px;}
.sb-convs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.sb-grp{padding:4px 10px 2px;}
.sb-grp-label{font-size:9.5px;font-weight:600;letter-spacing:.9px;color:var(--text-3);text-transform:uppercase;padding:8px 8px 4px;font-family:'DM Sans',sans-serif;}
.sb-item{padding:6px 10px;border-radius:var(--r-sm);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s;margin-bottom:1px;}
.sb-item:hover{background:var(--bg);}
.sb-item.active{background:var(--border-sub);}
.sb-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;opacity:.85;}
.sb-item-text{font-size:12.5px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.sb-item.active .sb-item-text{color:var(--text-1);font-weight:500;}
.sb-brand{margin:0 10px 14px;padding:11px 12px;border:1px solid var(--border-sub);border-radius:var(--r);background:#FAFAF8;}
.sb-brand-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.sb-brand-av{width:26px;height:26px;border-radius:var(--r-xs);background:var(--ink);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;font-family:'Noto Sans SC',sans-serif;}
.sb-brand-name{font-size:12px;font-weight:600;color:var(--text-1);}
.sb-brand-sub{font-size:10px;color:var(--text-3);margin-top:1px;}
.sb-brand-tags{display:flex;gap:3px;flex-wrap:wrap;}
.sb-brand-tag{font-size:10px;padding:2px 6px;border-radius:3px;background:var(--border-sub);color:var(--text-3);font-family:'DM Sans',sans-serif;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* HEADER */
.chat-hdr{background:rgba(240,237,232,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:11px 22px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.hdr-plat{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:var(--r-xs);font-family:'DM Sans',sans-serif;flex-shrink:0;}
.hdr-plat-xhs{background:var(--xhs-lt);color:var(--xhs);border:1px solid var(--xhs-bd);}
.hdr-plat-dy{background:var(--dy-lt);color:var(--dy);border:1px solid var(--dy-bd);}
.hdr-title{font-size:13px;color:var(--text-2);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-btn{width:28px;height:28px;border-radius:var(--r-sm);border:1px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-3);transition:all .15s;}
.hdr-btn:hover{background:var(--surface);color:var(--text-1);}
.view-toggle{display:flex;gap:2px;background:var(--border-sub);border-radius:var(--r-sm);padding:3px;margin-left:6px;border:1px solid var(--border);}
.vtab{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;color:var(--text-3);transition:all .12s;border:none;background:transparent;font-family:inherit;}
.vtab.on{background:var(--surface);color:var(--text-1);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08);}

/* CHAT BODY with dot grid */
.chat-body{flex:1;overflow-y:auto;
  background-image:radial-gradient(circle,rgba(0,0,0,.09) 1px,transparent 1px);
  background-size:22px 22px;
  padding:28px 0 12px;}
.chat-body::-webkit-scrollbar{width:3px;}
.chat-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.msgs{max-width:760px;width:100%;margin:0 auto;padding:0 26px;display:flex;flex-direction:column;gap:20px;}

/* MESSAGES */
.msg-row{display:flex;align-items:flex-start;gap:10px;}
.msg-row.usr{flex-direction:row-reverse;}
/* chat avatars removed — sender is read from alignment + bubble color */
.msg-col{display:flex;flex-direction:column;gap:8px;max-width:92%;}
.msg-row.usr .msg-col{align-items:flex-end;}
.bubble{padding:10px 14px;font-size:13.5px;line-height:1.7;white-space:pre-line;border-radius:var(--r-lg);}
.bubble-ai{background:var(--surface);color:var(--text-1);border:1px solid var(--border);border-bottom-left-radius:3px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.bubble-usr{background:var(--ink);color:#fff;border-bottom-right-radius:3px;}

/* RESULT CARD — XHS POST PREVIEW */
.rc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.07);width:100%;max-width:760px;}
.rc-toolbar{padding:10px 14px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border-sub);background:#FAFAF8;}
.rc-plat{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:var(--r-xs);font-family:'DM Sans',sans-serif;}
.rc-plat-xhs{background:var(--xhs-lt);color:var(--xhs);border:1px solid var(--xhs-bd);}
.rc-plat-dy{background:var(--dy-lt);color:var(--dy);border:1px solid var(--dy-bd);}
.rc-spacer{flex:1;}
.rc-btns{display:flex;gap:4px;}
.rc-btn{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:var(--r-xs);font-size:11.5px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-2);transition:all .13s;font-family:inherit;white-space:nowrap;}
.rc-btn:hover{background:var(--bg);border-color:var(--text-3);color:var(--text-1);}
.rc-btn.ink{background:var(--ink);border-color:var(--ink);color:#fff;}
.rc-btn.ink:hover{background:var(--ink-hover);}

/* RESULT CARD — realistic XHS post preview on a stage */
.rc-stage{background:#ECE7DF;padding:20px;display:flex;justify-content:center;
  background-image:radial-gradient(circle,rgba(0,0,0,.05) 1px,transparent 1px);background-size:16px 16px;}
.xp{width:338px;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 12px 36px rgba(0,0,0,.15);border:1px solid rgba(0,0,0,.04);}
.xp-top{display:flex;align-items:center;gap:9px;padding:11px 13px;}
.xp-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#FFD9C2,#FFB59A);color:#B23A1E;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:'Noto Sans SC',sans-serif;flex-shrink:0;}
.xp-id{flex:1;min-width:0;}
.xp-name{font-size:13px;font-weight:600;color:#222;}
.xp-loc{font-size:10.5px;color:#b3b3b3;margin-top:1px;}
.xp-follow{font-size:12px;color:#fff;background:var(--xhs);border:none;border-radius:14px;padding:4px 16px;font-weight:600;cursor:pointer;font-family:'Noto Sans SC',sans-serif;flex-shrink:0;}
.xp-cover{position:relative;width:100%;height:200px;background:linear-gradient(150deg,#F5EEE4 0%,#EADFCE 100%);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.xp-cover-mid{display:flex;flex-direction:column;align-items:center;gap:7px;}
.xp-cover-icon{width:42px;height:42px;border-radius:50%;border:1.5px dashed #C7BAA8;display:flex;align-items:center;justify-content:center;color:#B7A994;}
.xp-cover-hint{font-size:12px;color:#A8997F;font-weight:500;}
.xp-cover-spec{font-size:10.5px;color:#C2B6A6;}
.xp-counter{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.42);color:#fff;font-size:11px;font-weight:500;padding:2px 9px;border-radius:11px;font-family:'DM Sans',sans-serif;}
.xp-dots{position:absolute;bottom:11px;left:50%;transform:translateX(-50%);display:flex;gap:5px;}
.xp-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.55);}
.xp-dot.on{background:#fff;}
.xp-content{padding:13px 14px 6px;display:flex;flex-direction:column;gap:9px;}
.xp-title{font-size:15.5px;font-weight:700;color:#1d1d1d;line-height:1.45;font-family:'Noto Sans SC',sans-serif;}
.xp-text{font-size:13px;line-height:1.74;color:#2f2f2f;white-space:pre-line;max-height:212px;overflow-y:auto;font-family:'Noto Sans SC',sans-serif;}
.xp-text::-webkit-scrollbar{width:2px;}
.xp-text::-webkit-scrollbar-thumb{background:#e2e2e2;border-radius:2px;}
.xp-tags{display:flex;flex-wrap:wrap;gap:2px 9px;}
.xp-tag{font-size:13px;color:#3A5BA0;font-weight:500;cursor:pointer;font-family:'Noto Sans SC',sans-serif;}
.xp-meta{font-size:11px;color:#b3b3b3;margin-top:3px;}
.xp-actions{display:flex;align-items:center;gap:11px;padding:9px 13px;border-top:1px solid #f1f1f1;}
.xp-comment-box{flex:1;background:#f5f5f5;border-radius:15px;padding:6px 14px;font-size:12px;color:#aeaeae;}
.xp-action{display:flex;align-items:center;gap:3px;color:#555;cursor:pointer;}
.xp-action:hover{color:var(--xhs);}
.rc-footer{padding:9px 14px;border-top:1px solid var(--border-sub);display:flex;align-items:center;gap:14px;background:#FAFAF8;}
.rc-check{display:flex;align-items:center;gap:5px;font-size:10.5px;color:#4D7C60;font-weight:500;font-family:'DM Sans',sans-serif;}
.rc-check::before{content:'✓';font-weight:700;}
.rc-tip-inline{font-size:10.5px;color:var(--text-3);margin-left:auto;}

/* INPUT */
.input-wrap{padding:10px 22px 20px;flex-shrink:0;}
.input-shell{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);transition:border-color .15s;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.05);}
.input-shell:focus-within{border-color:var(--text-3);}
.input-top{padding:8px 12px 0;display:flex;align-items:center;gap:4px;}
.ptab{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:var(--r-xs);font-size:11.5px;font-weight:600;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--text-3);transition:all .12s;font-family:inherit;}
.ptab:hover:not(.ptab-xhs):not(.ptab-dy){background:var(--bg);color:var(--text-2);}
.ptab-xhs{background:var(--xhs-lt);color:var(--xhs);border-color:var(--xhs-bd);}
.ptab-dy{background:var(--dy-lt);color:var(--dy);border-color:var(--dy-bd);}
.input-divv{width:1px;height:12px;background:var(--border);margin:0 2px;}
.input-field{width:100%;border:none;outline:none;resize:none;padding:8px 12px 4px;font-size:13.5px;color:var(--text-1);background:transparent;font-family:'Noto Sans SC','DM Sans',sans-serif;line-height:1.65;min-height:46px;max-height:120px;overflow-y:auto;}
.input-field::placeholder{color:var(--text-3);}
.input-foot{display:flex;align-items:center;justify-content:space-between;padding:6px 12px 9px;}
.input-hint{font-size:11px;color:var(--text-3);}
.input-right{display:flex;align-items:center;gap:7px;}
.char-ct{font-size:11px;color:var(--text-3);font-family:'DM Sans',sans-serif;}
.send-btn{width:30px;height:30px;border-radius:var(--r-sm);background:var(--ink);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .15s;}
.send-btn:hover{opacity:.75;}
.send-btn:disabled{background:var(--border);cursor:default;}

/* WELCOME */
.welcome{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:40px 28px;
  background-image:radial-gradient(circle,rgba(0,0,0,.07) 1px,transparent 1px);
  background-size:22px 22px;}
.wl-hero{display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;}
.wl-mark{width:62px;height:62px;border-radius:50%;background:#fff;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,.1);color:var(--ink);}
.wl-title{font-family:'Instrument Serif',serif;font-size:28px;color:var(--text-1);letter-spacing:-.3px;line-height:1.1;}
.wl-sub{font-size:14px;color:var(--text-2);max-width:380px;line-height:1.6;}
.wl-mem{display:inline-flex;align-items:center;gap:7px;padding:7px 15px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:11.5px;color:var(--text-2);font-weight:500;margin-top:4px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.wl-mem-dot{width:6px;height:6px;border-radius:50%;background:#4D7C60;flex-shrink:0;}
.qa-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:560px;}
.qa-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 18px 16px;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;gap:6px;}
.qa-card:hover{border-color:var(--text-2);box-shadow:0 4px 18px rgba(0,0,0,.1);transform:translateY(-2px);}
.qa-icon{font-size:20px;line-height:1;}
.qa-title{font-size:13px;font-weight:600;color:var(--text-1);}
.qa-sub{font-size:11px;color:var(--text-3);line-height:1.5;}
.qa-plats{display:flex;gap:4px;margin-top:4px;}
.qa-plat{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:700;font-family:'DM Sans',sans-serif;}
</style>
</head>

<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const CONVS = {
  '今天': [
    { id:1, title:'玻尿酸面膜 · 种草笔记', plat:'xhs' },

  ],

};

const XHS_NOTE = {
  plat:'xhs', type:'小红书种草笔记',
  title:'干皮姐妹别划走！敷完这个面膜我室友问我打了水光针 💧',
  body:`姐妹们我真的不夸张，上周换季脸干到起皮，随手买了这个面膜试试，结果——

用了一周的变化：
📍 第1天：敷完觉得脸喝饱了水，但以为是即时效果
📍 第3天：上妆不卡粉了！粉底液都省了

✅ 3重玻尿酸（大中小分子，补水锁水都有）
✅ 神经酰胺（修护屏障）
✅ 无酒精无香精（敏感肌放心）

精华液超多，敷完还能抹脖子抹手。面膜纸很服帖，不会往下掉。味道淡淡的，没有廉价香精味。

💰 59元一盒 / 5片，活动买二送一，算下来一片不到8块
📌 干皮 / 混干皮闭眼入，油皮夏天可能觉得稍微滋润了点`,
  tags:['面膜推荐','补水面膜','敏感肌护肤','干皮救星','平价护肤','玻尿酸面膜'],
};

const MSGS = [
  { id:1, role:'user', text:'帮我写个小红书笔记，玻尿酸补水面膜，真实分享风格' },
  { id:2, role:'ai',   text:'好，给你写了一篇真实分享型的种草笔记 ✨', card: XHS_NOTE },
  { id:3, role:'user', text:'标题能更抓人一点吗？有没有其他版本？' },
  { id:4, role:'ai',   text:`当然！给你3个备选标题，风格各不同：

① 敷了7天才明白，为什么干皮都在偷偷囤这个面膜 💧
② 脸干到起皮然后我试了这个……（结果真的出乎意料）
③ 室友以为我去打了水光针😂 不，就是一个59块的面膜

你更喜欢哪个风格？` },
];

/* ICONS */
const IC = {
  plus:()=><svg width="12" height="12" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5" fill="none"><path d="M12 5v14M5 12h14"/></svg>,
  copy:()=><svg width="11" height="11" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" fill="none"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>,
  edit:()=><svg width="11" height="11" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" fill="none"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4z"/></svg>,
  refresh:()=><svg width="11" height="11" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" fill="none"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>,
  send:()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><polygon points="22 2 15 22 11 13 2 9 22 2" fill="white"/></svg>,
  cam:()=><svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5" fill="none"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>,
  heart:()=><svg width="19" height="19" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.7" fill="none"><path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 00-7.8 7.8l1 1.1L12 21l7.8-7.4 1-1.1a5.5 5.5 0 000-7.8z"/></svg>,
  star:()=><svg width="19" height="19" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.7" fill="none"><polygon points="12 2 15.1 8.6 22 9.3 17 14 18.2 21 12 17.6 5.8 21 7 14 2 9.3 8.9 8.6 12 2"/></svg>,
  comment:()=><svg width="19" height="19" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.7" fill="none"><path d="M21 11.5a8.4 8.4 0 01-9 8.4 9 9 0 01-4-.9L3 21l1.4-4a8.4 8.4 0 01-1-4 8.5 8.5 0 0117 0z"/></svg>,
  history:()=><svg width="13" height="13" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" fill="none"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
  share:()=><svg width="13" height="13" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" fill="none"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
};

const XhsMark=({s=12})=>(
  <svg width={s} height={s} viewBox="0 0 200 200" style={{borderRadius:2,overflow:'hidden'}}>
    <rect width="200" height="200" fill="#FF2442"/>
    <text x="100" y="148" textAnchor="middle" fontSize="126" fontWeight="900" fill="white" fontFamily="sans-serif">小</text>
  </svg>
);
const DyMark=({s=12})=>(
  <svg width={s} height={s} viewBox="0 0 200 200" style={{borderRadius:2,overflow:'hidden'}}>
    <rect width="200" height="200" fill="#0D0D0D"/>
    <path d="M128 58c0 0 14 4 22 16 0 0-12-2-22 10v68c0 22-18 36-38 36s-38-14-38-36 18-36 38-36c2 0 6 1 8 2v22c-2-1-5-2-8-2-9 0-16 7-16 14s7 14 16 14 16-7 16-14V38h22z" fill="white"/>
  </svg>
);

/* ShopGenie genie-lamp logomark */
const BrandMark=({s=24})=>(
  <svg width={s} height={s*0.74} viewBox="0 0 30 22" fill="currentColor">
    <path d="M25.4 2.4l.62 1.78 1.78.62-1.78.62-.62 1.78-.62-1.78-1.78-.62 1.78-.62z" opacity="0.9"/>
    <path d="M11.4 7.1c.5-.15.5-1.05 0-1.2-.5.15-.5 1.05 0 1.2z"/>
    <circle cx="11.4" cy="6.5" r="1.35"/>
    <rect x="10.75" y="7.2" width="1.3" height="1.5"/>
    <path d="M4 14.3C4 10.9 8 9 13 9c3.4 0 6.3 1 8 2.6l4.1-2.4c.62-.36 1.2.5.66 1l-3.2 2.9c.46.86.42 1.7.16 2.4-1.2 3-5.6 4-10 4-5.4 0-8.6-2.2-8.6-4.6z"/>
    <path d="M3.9 13.4c-2.1-.3-2.45-2.9.45-3.45" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
  </svg>
);

/* SIDEBAR */
function Sidebar({ activeId, onSelect, onNew }) {
  const dot = { xhs:'var(--xhs)', dy:'var(--text-3)', null:'var(--text-3)' };
  return (
    <aside className="sidebar">
      <div className="sb-logo">
        <div className="sb-logo-mark"><BrandMark s={24}/></div>
        <div>
          <div className="sb-logo-name">ShopGenie</div>
          <div className="sb-logo-sub">商店精灵</div>
        </div>
      </div>
      <button className="sb-new" onClick={onNew}>{IC.plus()} 新对话</button>
      <div className="sb-convs">
        {Object.entries(CONVS).map(([grp,items])=>(
          <div key={grp} className="sb-grp">
            <div className="sb-grp-label">{grp}</div>
            {items.map(item=>(
              <div key={item.id} className={`sb-item${item.id===activeId?' active':''}`} onClick={()=>onSelect(item.id)}>
                {item.plat && <span className="sb-dot" style={{background:dot[item.plat]}}/>}
                <span className="sb-item-text">{item.title}</span>
              </div>
            ))}
          </div>
        ))}
      </div>
      <div className="sb-brand">
        <div className="sb-brand-row">
          <div className="sb-brand-av">美</div>
          <div>
            <div className="sb-brand-name">XX美妆</div>
            <div className="sb-brand-sub">护肤品 · 品牌档案</div>
          </div>
        </div>
        <div className="sb-brand-tags">
          {['真实感','不要硬广','XHS','抖音'].map(t=><span key={t} className="sb-brand-tag">{t}</span>)}
        </div>
      </div>
    </aside>
  );
}

/* RESULT CARD */
function ResultCard({ card }) {
  const [copied, setCopied] = useState(false);
  const isXhs = card.plat === 'xhs';
  const doCopy = () => { setCopied(true); setTimeout(()=>setCopied(false),2200); };
  return (
    <div className="rc">
      {/* Toolbar */}
      <div className="rc-toolbar">
        <span className={`rc-plat ${isXhs?'rc-plat-xhs':'rc-plat-dy'}`}>
          {isXhs?<XhsMark/>:<DyMark/>} {card.type}
        </span>
        <div className="rc-spacer"/>
        <div className="rc-btns">
          <button className="rc-btn">{IC.refresh()} 再来一版</button>
          <button className="rc-btn">{IC.edit()} 编辑</button>
          <button className="rc-btn ink" onClick={doCopy}>{IC.copy()} {copied?'已复制':'复制全文'}</button>
        </div>
      </div>

      {/* Realistic XHS post preview on a stage */}
      <div className="rc-stage">
        <div className="xp">
          <div className="xp-top">
            <div className="xp-av">美</div>
            <div className="xp-id">
              <div className="xp-name">XX美妆旗舰店</div>
              <div className="xp-loc">上海 · 刚刚</div>
            </div>
            <button className="xp-follow">关注</button>
          </div>

          <div className="xp-cover">
            <span className="xp-counter">1/4</span>
            <div className="xp-cover-mid">
              <div className="xp-cover-icon">{IC.cam()}</div>
              <div className="xp-cover-hint">添加封面图</div>
              <div className="xp-cover-spec">建议 3:4 竖图 · 拖入或生成</div>
            </div>
            <div className="xp-dots">
              <span className="xp-dot on"/><span className="xp-dot"/><span className="xp-dot"/><span className="xp-dot"/>
            </div>
          </div>

          <div className="xp-content">
            <div className="xp-title">{card.title}</div>
            <div className="xp-text">{card.body}</div>
            <div className="xp-tags">
              {card.tags.map(t=><span key={t} className="xp-tag">#{t}</span>)}
            </div>
            <div className="xp-meta">编辑于 06-08 · 上海</div>
          </div>

          <div className="xp-actions">
            <div className="xp-comment-box">说点什么...</div>
            <span className="xp-action">{IC.heart()}</span>
            <span className="xp-action">{IC.star()}</span>
            <span className="xp-action">{IC.comment()}</span>
          </div>
        </div>
      </div>

      {/* Footer bar */}
      <div className="rc-footer">
        <span className="rc-check">违禁词通过</span>
        <span className="rc-check">平台规则合规</span>
        <span className="rc-check">6 标签已优化</span>
        <span className="rc-tip-inline">💡 建议晚 8–10 点发布，前 30 分钟积极回复评论</span>
      </div>
    </div>
  );
}

/* MESSAGE */
function Msg({ msg }) {
  const isUsr = msg.role === 'user';
  return (
    <div className={`msg-row${isUsr?' usr':''}`}>
      <div className="msg-col">
        <div className={`bubble ${isUsr?'bubble-usr':'bubble-ai'}`}>{msg.text}</div>
        {msg.card && <ResultCard card={msg.card}/>}
      </div>
    </div>
  );
}

/* WELCOME */
function Welcome({ onAction }) {
  const actions = [
    { icon:'🎬', title:'写抖音短视频脚本', sub:'15–60秒，Hook + 卖点 + 引导', plats:['抖音'] },
    { icon:'📝', title:'写小红书种草笔记', sub:'图文笔记，含标题、正文、标签', plats:['小红书'] },
    { icon:'🛍️', title:'写商品文案',       sub:'标题 + 卖点 + 详情页', plats:['抖音','小红书'] },
    { icon:'💬', title:'自由对话',           sub:'直接告诉我你需要什么', plats:[] },
  ];
  const pStyle = p => p==='小红书'
    ? {background:'var(--xhs-lt)',color:'var(--xhs)'}
    : {background:'var(--dy-lt)',color:'#555'};
  return (
    <div className="welcome" data-screen-label="Welcome">
      <div className="wl-hero">
        <div className="wl-mark"><BrandMark s={30}/></div>
        <div className="wl-title">你好，我是 ShopGenie</div>
        <div className="wl-sub">告诉我商品信息，我帮你写出能卖货的内容</div>
        <div className="wl-mem">
          <span className="wl-mem-dot"/>
          已记住：XX美妆 · 护肤品 · 真实感 · 不要硬广
        </div>
      </div>
      <div className="qa-grid">
        {actions.map((a,i)=>(
          <div key={i} className="qa-card" onClick={()=>onAction(a.title)}>
            <div className="qa-icon">{a.icon}</div>
            <div className="qa-title">{a.title}</div>
            <div className="qa-sub">{a.sub}</div>
            {a.plats.length>0&&(
              <div className="qa-plats">
                {a.plats.map(p=><span key={p} className="qa-plat" style={pStyle(p)}>{p}</span>)}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

/* INPUT */
function ChatInput({ plat, onPlat }) {
  const [text, setText] = useState('');
  return (
    <div className="input-wrap">
      <div className="input-shell">
        <div className="input-top">
          <button className={`ptab${plat==='xhs'?' ptab-xhs':''}`} onClick={()=>onPlat('xhs')}><XhsMark/> 小红书</button>
          <div className="input-divv"/>
          <button className={`ptab${plat==='dy'?' ptab-dy':''}`} onClick={()=>onPlat('dy')}><DyMark/> 抖音</button>
        </div>
        <textarea className="input-field" placeholder="继续和我说，或告诉我新商品信息…" value={text} onChange={e=>setText(e.target.value)} rows={2}/>
        <div className="input-foot">
          <span className="input-hint">↵ 发送 · Shift+↵ 换行</span>
          <div className="input-right">
            <span className="char-ct">{text.length} / 500</span>
            <button className="send-btn" disabled={!text.trim()}>{IC.send()}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* APP */
function App() {
  const [activeId, setActiveId] = useState(1);
  const [view, setView]         = useState('chat');
  const [plat, setPlat]         = useState('xhs');
  const bodyRef                 = useRef(null);

  useEffect(()=>{
    if(bodyRef.current && view==='chat') bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  },[view,activeId]);

  const gotoChat = id => { setActiveId(id); setView('chat'); };
  const gotoNew  = ()  => { setActiveId(null); setView('welcome'); };

  return (
    <div className="app">
      <Sidebar activeId={activeId} onSelect={gotoChat} onNew={gotoNew}/>
      <main className="main">
        {/* Header */}
        <div className="chat-hdr">
          {view==='chat'?(
            <>
              <div className={`hdr-plat ${plat==='xhs'?'hdr-plat-xhs':'hdr-plat-dy'}`}>
                {plat==='xhs'?<XhsMark/>:<DyMark/>}
                {plat==='xhs'?'小红书':'抖音'}
              </div>
              <span className="hdr-title">玻尿酸补水面膜 · 种草笔记</span>
            </>
          ):(
            <span className="hdr-title" style={{color:'var(--text-1)',fontWeight:600}}>新对话</span>
          )}
          <div style={{flex:1}}/>
          {view==='chat'&&<>
            <button className="hdr-btn">{IC.history()}</button>
            <button className="hdr-btn">{IC.share()}</button>
          </>}
          <div className="view-toggle">
            <button className={`vtab${view==='chat'?' on':''}`} onClick={()=>setView('chat')}>对话</button>
            <button className={`vtab${view==='welcome'?' on':''}`} onClick={gotoNew}>新对话</button>
          </div>
        </div>

        {/* Body */}
        {view==='chat'?(
          <div className="chat-body" ref={bodyRef} data-screen-label="Chat">
            <div className="msgs">
              {MSGS.map(m=><Msg key={m.id} msg={m}/>)}
              <div style={{height:8}}/>
            </div>
          </div>
        ):(
          <Welcome onAction={()=>gotoChat(1)}/>
        )}

        <ChatInput plat={plat} onPlat={setPlat}/>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
