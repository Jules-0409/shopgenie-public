<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ShopGenie · 商店精灵</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root {
  --sidebar: #FFFFFF;
  --sidebar-border: #E8EDF8;
  --sidebar-hover: #F4F7FE;
  --sidebar-active: #EEF1FF;
  --bg: #EFF3FD;
  --surface: #FFFFFF;
  --border: #E2E8F6;
  --border-subtle: #EEF2FA;
  --primary: #4C6EF5;
  --primary-dk: #3A58D4;
  --primary-lt: #EEF1FF;
  --text-1: #18202E;
  --text-2: #4A5268;
  --text-3: #8A91A8;
  --xhs: #FF2D55;
  --xhs-bg: #FFF0F3;
  --xhs-border: #FFCCD8;
  --douyin: #161616;
  --douyin-bg: #F1F1F1;
  --douyin-border: #DCDCDC;
  --r-xs: 5px; --r-sm: 8px; --r: 12px; --r-lg: 16px; --r-xl: 20px;
  --sh-xs: 0 1px 3px rgba(0,0,0,.05);
  --sh: 0 3px 12px rgba(0,0,0,.08);
  --sh-lg: 0 8px 28px rgba(0,0,0,.11);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;overflow:hidden;}
body{
  font-family:'Plus Jakarta Sans','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);color:var(--text-1);
  -webkit-font-smoothing:antialiased;
}
/* ── Layout ── */
.app{display:flex;height:100vh;overflow:hidden;}
/* ── Sidebar ── */
.sidebar{width:260px;flex-shrink:0;background:var(--sidebar);display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border);}
.sb-logo{padding:20px 18px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.sb-logo-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(140deg,#4C6EF5,#7C3AED);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 12px rgba(76,110,245,.4);}
.sb-logo-text{display:flex;flex-direction:column;gap:1px;}
.sb-logo-en{font-size:14px;font-weight:700;color:var(--text-1);letter-spacing:-.3px;}
.sb-logo-zh{font-size:10px;color:var(--text-3);letter-spacing:.6px;}
.sb-new{margin:12px 12px 4px;padding:8px 14px;background:var(--primary-lt);border:1px solid #D1DAFF;border-radius:var(--r-sm);color:var(--primary);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s;font-family:inherit;}
.sb-new:hover{background:#E4E9FF;border-color:#B8C5FF;}
.sb-conversations{flex:1;overflow-y:auto;padding-bottom:8px;}
.sb-conversations::-webkit-scrollbar{width:2px;}
.sb-conversations::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:2px;}
.sb-group{padding:6px 12px 2px;}
.sb-group-label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text-3);text-transform:uppercase;padding:6px 8px 4px;}
.sb-item{padding:7px 10px;border-radius:var(--r-xs);cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .12s;margin-bottom:1px;}
.sb-item:hover{background:var(--sidebar-hover);}
.sb-item.active{background:var(--sidebar-active);}
.sb-item-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.sb-item-text{font-size:12.5px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.sb-item.active .sb-item-text{color:var(--primary);font-weight:600;}
.sb-item-chip{font-size:10px;padding:2px 6px;border-radius:4px;flex-shrink:0;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;}
.sb-brand{margin:0 12px 16px;padding:12px 13px;background:#F7F9FF;border:1px solid var(--border);border-radius:var(--r);}
.sb-brand-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.sb-brand-av{width:28px;height:28px;border-radius:7px;background:linear-gradient(140deg,#4C6EF5,#7C3AED);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.sb-brand-name{font-size:12px;font-weight:600;color:var(--text-1);}
.sb-brand-sub{font-size:10px;color:var(--text-3);margin-top:1px;}
.sb-brand-tags{display:flex;gap:4px;flex-wrap:wrap;}
.sb-brand-tag{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--border-subtle);color:var(--text-3);}
/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
/* ── Chat Header ── */
.chat-header{background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:13px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.plat-badge{display:flex;align-items:center;gap:6px;padding:4px 11px;border-radius:var(--r-sm);font-size:12px;font-weight:700;flex-shrink:0;font-family:'Plus Jakarta Sans',sans-serif;}
.plat-xhs{background:var(--xhs-bg);color:var(--xhs);border:1px solid var(--xhs-border);}
.plat-dy{background:var(--douyin-bg);color:var(--douyin);border:1px solid var(--douyin-border);}
.chat-title{font-size:13.5px;color:var(--text-2);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-btn{width:30px;height:30px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-3);transition:all .15s;flex-shrink:0;}
.hdr-btn:hover{background:var(--primary-lt);border-color:#C5CEFF;color:var(--primary);}
.view-toggle{display:flex;gap:4px;align-items:center;background:var(--border-subtle);border-radius:var(--r-sm);padding:3px;margin-left:8px;}
.view-tab{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;color:var(--text-3);transition:all .12s;border:none;background:transparent;font-family:inherit;}
.view-tab.on{background:var(--surface);color:var(--primary);box-shadow:var(--sh-xs);}
/* ── Chat Body ── */
.chat-body{flex:1;overflow-y:auto;padding:32px 0 12px;}
.chat-body::-webkit-scrollbar{width:3px;}
.chat-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.09);border-radius:3px;}
.msgs{max-width:780px;width:100%;margin:0 auto;padding:0 28px;display:flex;flex-direction:column;gap:22px;}
/* ── Messages ── */
.msg-row{display:flex;align-items:flex-start;gap:11px;}
.msg-row.usr{flex-direction:row-reverse;}
.msg-av{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:1px;}
.av-ai{background:linear-gradient(140deg,#4C6EF5,#7C3AED);}
.av-usr{background:#FF9F43;font-size:11px;font-weight:700;color:#fff;}
.msg-col{display:flex;flex-direction:column;gap:8px;max-width:88%;}
.msg-row.usr .msg-col{align-items:flex-end;}
.bubble{padding:10px 15px;border-radius:14px;font-size:13.5px;line-height:1.65;white-space:pre-line;}
.bubble-ai{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px;box-shadow:var(--sh-xs);color:var(--text-1);}
.bubble-usr{background:var(--primary);color:#fff;border-bottom-right-radius:4px;}
/* ── Result Card ── */
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh-lg);width:100%;}
.rc-header{padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border-subtle);background:#FAFBFF;}
.rc-type{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:var(--r-xs);font-family:'Plus Jakarta Sans',sans-serif;}
.rc-type-xhs{background:var(--xhs-bg);color:var(--xhs);border:1px solid var(--xhs-border);}
.rc-type-dy{background:var(--douyin-bg);color:var(--douyin);border:1px solid var(--douyin-border);}
.rc-spacer{flex:1;}
.rc-btns{display:flex;gap:5px;}
.rc-btn{display:flex;align-items:center;gap:4px;padding:5px 11px;border-radius:var(--r-xs);font-size:11.5px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text-2);transition:all .14s;font-family:inherit;white-space:nowrap;}
.rc-btn:hover{background:var(--primary-lt);border-color:#C5CEFF;color:var(--primary);}
.rc-btn.primary{background:var(--primary);border-color:var(--primary);color:#fff;}
.rc-btn.primary:hover{background:var(--primary-dk);border-color:var(--primary-dk);}
.rc-body{padding:18px 20px;display:flex;flex-direction:column;gap:14px;}
.rc-label{font-size:9.5px;font-weight:700;letter-spacing:1.1px;color:var(--text-3);text-transform:uppercase;margin-bottom:5px;font-family:'Plus Jakarta Sans',sans-serif;}
.rc-title{font-size:15.5px;font-weight:700;color:var(--text-1);line-height:1.5;}
.rc-divider{height:1px;background:var(--border-subtle);}
.rc-text{font-size:13px;line-height:1.8;color:#2A3245;white-space:pre-line;}
.rc-tags{display:flex;flex-wrap:wrap;gap:6px;}
.rc-tag{font-size:11.5px;padding:3px 11px;border-radius:20px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:opacity .12s;}
.rc-tag:hover{opacity:.8;}
.rc-tag-xhs{background:var(--xhs-bg);color:var(--xhs);}
.rc-tag-dy{background:var(--douyin-bg);color:#555;}
.rc-tips{background:#FFFBEF;border:1px solid #FAE89A;border-radius:var(--r-sm);padding:12px 14px;}
.rc-tips-title{font-size:11.5px;font-weight:700;color:#8A6200;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.rc-tip{font-size:12px;color:#7A5500;line-height:1.75;display:flex;align-items:baseline;gap:6px;}
.rc-tip::before{content:'·';flex-shrink:0;}
.rc-footer{padding:9px 16px;border-top:1px solid var(--border-subtle);background:#F8FAFE;display:flex;align-items:center;gap:10px;}
.rc-check{display:flex;align-items:center;gap:5px;font-size:10.5px;color:#3D9970;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;}
.rc-check-dot{width:6px;height:6px;border-radius:50%;background:#3D9970;flex-shrink:0;}
/* ── Input ── */
.input-wrap{padding:10px 24px 20px;flex-shrink:0;}
.input-shell{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);box-shadow:0 4px 24px rgba(76,110,245,.07);transition:border-color .15s,box-shadow .15s;overflow:hidden;}
.input-shell:focus-within{border-color:var(--primary);box-shadow:0 4px 24px rgba(76,110,245,.16);}
.input-top{padding:10px 14px 0;display:flex;align-items:center;gap:5px;}
.plat-tab{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:var(--r-xs);font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--text-3);transition:all .12s;font-family:inherit;}
.plat-tab:hover:not(.plat-tab-xhs):not(.plat-tab-dy){background:var(--bg);color:var(--text-2);}
.plat-tab-xhs{background:var(--xhs-bg);color:var(--xhs);border-color:var(--xhs-border);}
.plat-tab-dy{background:var(--douyin-bg);color:var(--douyin);border-color:var(--douyin-border);}
.input-divider-v{width:1px;height:14px;background:var(--border);margin:0 2px;}
.input-field{width:100%;border:none;outline:none;resize:none;padding:8px 14px 4px;font-size:13.5px;color:var(--text-1);background:transparent;font-family:'Noto Sans SC','Plus Jakarta Sans',sans-serif;line-height:1.65;min-height:48px;max-height:130px;overflow-y:auto;}
.input-field::placeholder{color:#B8BFCF;}
.input-bottom{display:flex;align-items:center;justify-content:space-between;padding:6px 14px 10px;}
.input-hint{font-size:11px;color:#BFC5D4;display:flex;align-items:center;gap:5px;}
.input-right{display:flex;align-items:center;gap:8px;}
.char-ct{font-size:11px;color:#BFC5D4;font-family:'Plus Jakarta Sans',sans-serif;}
.send-btn{width:32px;height:32px;border-radius:var(--r-sm);background:var(--primary);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.send-btn:hover{background:var(--primary-dk);transform:scale(1.06);}
.send-btn:disabled{background:#C5CBDD;cursor:default;transform:none;}
/* ── Welcome Screen ── */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;gap:28px;overflow-y:auto;}
.wl-hero{display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;}
.wl-icon{width:58px;height:58px;border-radius:18px;background:linear-gradient(140deg,#4C6EF5,#7C3AED);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 28px rgba(76,110,245,.32);}
.wl-title{font-size:26px;font-weight:700;color:var(--text-1);letter-spacing:-.4px;}
.wl-sub{font-size:14.5px;color:var(--text-2);max-width:400px;line-height:1.6;}
.wl-mem{display:flex;align-items:center;gap:8px;padding:8px 18px;background:var(--primary-lt);border-radius:20px;font-size:12px;color:var(--primary);font-weight:600;margin-top:4px;}
.qa-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;width:100%;max-width:580px;}
.qa-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:18px 18px 16px;cursor:pointer;transition:all .16s;display:flex;flex-direction:column;gap:6px;}
.qa-card:hover{border-color:var(--primary);box-shadow:0 6px 20px rgba(76,110,245,.13);transform:translateY(-2px);}
.qa-icon{font-size:22px;line-height:1;}
.qa-title{font-size:13px;font-weight:700;color:var(--text-1);}
.qa-sub{font-size:11.5px;color:var(--text-3);line-height:1.5;}
.qa-plats{display:flex;gap:4px;margin-top:4px;}
.qa-plat{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;}
/* ── Typing indicator ── */
.typing{display:flex;align-items:center;gap:4px;padding:10px 14px;}
.typing span{width:6px;height:6px;border-radius:50%;background:#BFC5D4;display:inline-block;animation:bounce .9s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px);background:var(--primary);}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

/* ── DATA ── */
const CONVS = {
  '今天': [
    { id:1, title:'玻尿酸面膜 · 种草笔记', plat:'xhs' },
    { id:2, title:'连衣裙秋冬短视频脚本',  plat:'dy'  },
  ],
  '昨天': [
    { id:3, title:'口红测评文案',           plat:'xhs' },
    { id:4, title:'羽绒服上新商品标题',      plat:'dy'  },
    { id:5, title:'护肤品套装合集推荐',      plat:'xhs' },
  ],
  '更早': [
    { id:6, title:'店铺运营方案咨询',        plat:null  },
  ],
};

const XHS_NOTE = {
  plat: 'xhs', type: '小红书种草笔记',
  title: '干皮姐妹别划走！敷完这个面膜我室友问我打了水光针 💧',
  body: `姐妹们我真的不夸张，上周换季脸干到起皮，随手买了这个面膜试试，结果——

用了一周的变化：
📍 第1天：敷完觉得脸喝饱了水，但以为是即时效果
📍 第3天：上妆不卡粉了！粉底液都省了
📍 第7天：室友问我是不是偷偷去打了水光针 😂

成分扒了一下：
✅ 3重玻尿酸（大中小分子，补水锁水都有）
✅ 神经酰胺（修护屏障）
✅ 无酒精无香精（敏感肌放心）

精华液超多，敷完还能抹脖子抹手。面膜纸很服帖，不会往下掉。味道淡淡的，没有廉价香精味。

💰 59元一盒 / 5片，活动买二送一，算下来一片不到8块
📌 干皮 / 混干皮闭眼入，油皮夏天可能觉得稍微滋润了点`,
  tags: ['面膜推荐','补水面膜','敏感肌护肤','干皮救星','平价护肤','玻尿酸面膜'],
  tips: ['首图用敷面膜的对比图（敷前/敷后效果）','晚上 8–10 点发布，自然流量最旺','前 30 分钟积极回复评论，有助于系统推流'],
};

const MSGS = [
  { id:1, role:'user', text:'帮我写个小红书笔记，玻尿酸补水面膜，真实分享风格' },
  { id:2, role:'ai', text:'好，给你写了一篇真实分享型的种草笔记 ✨', card: XHS_NOTE },
  { id:3, role:'user', text:'标题能更抓人一点吗？有没有其他版本？' },
  { id:4, role:'ai', text:`当然！给你3个备选标题，风格各不同：

① 敷了7天才明白，为什么干皮都在偷偷囤这个面膜 💧
② 脸干到起皮然后我试了这个……（结果真的出乎意料）
③ 室友以为我去打了水光针😂 不，就是一个59块的面膜

你更喜欢哪个风格？可以直接说，我来改标题。` },
];

/* ── ICONS ── */
const IC = {
  sparkle: (s=16,c='white') => (
    <svg width={s} height={s} viewBox="0 0 24 24" fill={c}>
      <path d="M12 2l1.8 7.4L21 12l-7.2 2.6L12 22l-1.8-7.4L3 12l7.2-2.6z"/>
    </svg>
  ),
  plus: () => <svg width="13" height="13" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5" fill="none"><path d="M12 5v14M5 12h14"/></svg>,
  copy: () => <svg width="12" height="12" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" fill="none"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>,
  edit: () => <svg width="12" height="12" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" fill="none"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4z"/></svg>,
  refresh: () => <svg width="12" height="12" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" fill="none"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>,
  send: () => <svg width="15" height="15" viewBox="0 0 24 24" stroke="white" strokeWidth="2.3" fill="none"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2" fill="white" stroke="none"/></svg>,
  history: () => <svg width="14" height="14" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" fill="none"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
  share: () => <svg width="14" height="14" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" fill="none"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
};

/* ── Platform logo SVGs ── */
const XhsMark = ({s=13}) => (
  <svg width={s} height={s} viewBox="0 0 200 200" style={{borderRadius:3,overflow:'hidden'}}>
    <rect width="200" height="200" fill="#FF2D55"/>
    <text x="100" y="148" textAnchor="middle" fontSize="126" fontWeight="900" fill="white" fontFamily="sans-serif">小</text>
  </svg>
);
const DyMark = ({s=13}) => (
  <svg width={s} height={s} viewBox="0 0 200 200" style={{borderRadius:3,overflow:'hidden'}}>
    <rect width="200" height="200" fill="#161616"/>
    <path d="M128 58c0 0 14 4 22 16 0 0-12-2-22 10v68c0 22-18 36-38 36s-38-14-38-36 18-36 38-36c2 0 6 1 8 2v22c-2-1-5-2-8-2-9 0-16 7-16 14s7 14 16 14 16-7 16-14V38h22z" fill="white"/>
  </svg>
);

/* ── Sidebar ── */
function Sidebar({ activeId, onSelect, onNew }) {
  const platStyle = { xhs: { bg:'var(--xhs-bg)', color:'var(--xhs)', label:'XHS' }, dy: { bg:'var(--douyin-bg)', color:'#555', label:'抖音' } };
  return (
    <aside className="sidebar">
      <div className="sb-logo">
        <div className="sb-logo-icon">{IC.sparkle(17)}</div>
        <div className="sb-logo-text">
          <span className="sb-logo-en">ShopGenie</span>
          <span className="sb-logo-zh">商店精灵</span>
        </div>
      </div>
      <button className="sb-new" onClick={onNew}>{IC.plus()} 新对话</button>
      <div className="sb-conversations">
        {Object.entries(CONVS).map(([grp, items]) => (
          <div key={grp} className="sb-group">
            <div className="sb-group-label">{grp}</div>
            {items.map(item => {
              const p = item.plat ? platStyle[item.plat] : null;
              return (
                <div key={item.id} className={`sb-item${item.id===activeId?' active':''}`} onClick={()=>onSelect(item.id)}>
                  {p && <span className="sb-item-dot" style={{background:p.color}} />}
                  <span className="sb-item-text">{item.title}</span>
                  {p && <span className="sb-item-chip" style={{background:p.bg,color:p.color}}>{p.label}</span>}
                </div>
              );
            })}
          </div>
        ))}
      </div>
      <div className="sb-brand">
        <div className="sb-brand-header">
          <div className="sb-brand-av">美</div>
          <div>
            <div className="sb-brand-name">XX美妆</div>
            <div className="sb-brand-sub">护肤品 · 品牌档案</div>
          </div>
        </div>
        <div className="sb-brand-tags">
          {['真实感','不要硬广','XHS','抖音','25–35岁女性'].map(t=><span key={t} className="sb-brand-tag">{t}</span>)}
        </div>
      </div>
    </aside>
  );
}

/* ── Result Card ── */
function ResultCard({ card }) {
  const [copied, setCopied] = useState(false);
  const isXhs = card.plat === 'xhs';
  const tag = isXhs ? 'rc-tag-xhs' : 'rc-tag-dy';
  const copy = () => { setCopied(true); setTimeout(()=>setCopied(false),2200); };
  return (
    <div className="result-card">
      <div className="rc-header">
        <span className={`rc-type ${isXhs?'rc-type-xhs':'rc-type-dy'}`}>
          {isXhs ? <XhsMark /> : <DyMark />} {card.type}
        </span>
        <div className="rc-spacer" />
        <div className="rc-btns">
          <button className="rc-btn">{IC.refresh()} 再来一版</button>
          <button className="rc-btn">{IC.edit()} 编辑</button>
          <button className="rc-btn primary" onClick={copy}>{IC.copy()} {copied?'已复制 ✓':'复制全文'}</button>
        </div>
      </div>
      <div className="rc-body">
        <div>
          <div className="rc-label">标题</div>
          <div className="rc-title">{card.title}</div>
        </div>
        <div className="rc-divider" />
        <div>
          <div className="rc-label">正文</div>
          <div className="rc-text">{card.body}</div>
        </div>
        <div className="rc-divider" />
        <div>
          <div className="rc-label">标签</div>
          <div className="rc-tags">
            {card.tags.map(t=><span key={t} className={`rc-tag ${tag}`}>#{t}</span>)}
          </div>
        </div>
        <div className="rc-tips">
          <div className="rc-tips-title">💡 发布建议</div>
          {card.tips.map((tip,i)=><div key={i} className="rc-tip">{tip}</div>)}
        </div>
      </div>
      <div className="rc-footer">
        <div className="rc-check"><span className="rc-check-dot"/>违禁词检测通过</div>
        <div className="rc-check"><span className="rc-check-dot"/>平台规则合规</div>
        <div className="rc-check"><span className="rc-check-dot"/>6 个热门标签已优化</div>
      </div>
    </div>
  );
}

/* ── Message ── */
function Msg({ msg }) {
  const isUsr = msg.role === 'user';
  return (
    <div className={`msg-row${isUsr?' usr':''}`}>
      <div className={`msg-av ${isUsr?'av-usr':'av-ai'}`}>
        {isUsr ? '商' : IC.sparkle(14)}
      </div>
      <div className="msg-col">
        <div className={`bubble ${isUsr?'bubble-usr':'bubble-ai'}`}>{msg.text}</div>
        {msg.card && <ResultCard card={msg.card} />}
      </div>
    </div>
  );
}

/* ── Welcome Screen ── */
function Welcome({ onAction }) {
  const actions = [
    { icon:'🎬', title:'写抖音短视频脚本', sub:'15–60秒，含 Hook + 卖点 + 引导', plats:['抖音'] },
    { icon:'📝', title:'写小红书种草笔记', sub:'图文笔记，含标题、正文、标签', plats:['小红书'] },
    { icon:'🛍️', title:'写商品文案', sub:'标题 + 卖点 + 详情页文案', plats:['抖音','小红书'] },
    { icon:'💬', title:'自由对话', sub:'直接告诉我你需要什么', plats:[] },
  ];
  const platStyle = (p) => p==='小红书'
    ? {background:'var(--xhs-bg)',color:'var(--xhs)'}
    : {background:'var(--douyin-bg)',color:'#555'};
  return (
    <div className="welcome" data-screen-label="Welcome Screen">
      <div className="wl-hero">
        <div className="wl-icon">{IC.sparkle(26)}</div>
        <div className="wl-title">你好，我是 ShopGenie</div>
        <div className="wl-sub">告诉我你的商品，我来帮你产出能卖货的内容</div>
        <div className="wl-mem">✦ 已记住：XX美妆 · 护肤品 · 真实感风格 · 不要硬广</div>
      </div>
      <div className="qa-grid">
        {actions.map((a,i) => (
          <div key={i} className="qa-card" onClick={()=>onAction(a.title)}>
            <div className="qa-icon">{a.icon}</div>
            <div className="qa-title">{a.title}</div>
            <div className="qa-sub">{a.sub}</div>
            {a.plats.length > 0 && (
              <div className="qa-plats">
                {a.plats.map(p=><span key={p} className="qa-plat" style={platStyle(p)}>{p}</span>)}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── Chat Input ── */
function ChatInput({ plat, onPlat }) {
  const [text, setText] = useState('');
  return (
    <div className="input-wrap">
      <div className="input-shell">
        <div className="input-top">
          <button className={`plat-tab${plat==='xhs'?' plat-tab-xhs':''}`} onClick={()=>onPlat('xhs')}>
            <XhsMark /> 小红书
          </button>
          <div className="input-divider-v" />
          <button className={`plat-tab${plat==='dy'?' plat-tab-dy':''}`} onClick={()=>onPlat('dy')}>
            <DyMark /> 抖音
          </button>
        </div>
        <textarea
          className="input-field"
          placeholder={`继续和我说，或告诉我新商品信息…`}
          value={text}
          onChange={e=>setText(e.target.value)}
          rows={2}
        />
        <div className="input-bottom">
          <span className="input-hint">↵ 发送 &nbsp;·&nbsp; Shift+↵ 换行</span>
          <div className="input-right">
            <span className="char-ct">{text.length} / 500</span>
            <button className="send-btn" disabled={!text.trim()}>{IC.send()}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── App ── */
function App() {
  const [activeId, setActiveId]   = useState(1);
  const [view, setView]           = useState('chat'); // 'chat' | 'welcome'
  const [plat, setPlat]           = useState('xhs');
  const chatBodyRef               = useRef(null);

  useEffect(() => {
    if (chatBodyRef.current && view==='chat') {
      chatBodyRef.current.scrollTop = chatBodyRef.current.scrollHeight;
    }
  }, [view, activeId]);

  const handleNew  = () => { setView('welcome'); setActiveId(null); };
  const handleSel  = (id) => { setActiveId(id); setView('chat'); };
  const handleAct  = () => { setActiveId(1); setView('chat'); };

  return (
    <div className="app">
      <Sidebar activeId={activeId} onSelect={handleSel} onNew={handleNew} />
      <main className="main">
        {/* Header */}
        <div className="chat-header">
          {view==='chat' ? (
            <>
              <div className={`plat-badge ${plat==='xhs'?'plat-xhs':'plat-dy'}`}>
                {plat==='xhs' ? <XhsMark s={12}/> : <DyMark s={12}/>}
                {plat==='xhs' ? '小红书' : '抖音'}
              </div>
              <span className="chat-title">玻尿酸补水面膜 · 种草笔记</span>
            </>
          ) : (
            <span className="chat-title" style={{color:'var(--text-1)',fontWeight:600}}>新对话</span>
          )}
          <div className="rc-spacer" />
          {view==='chat' && (
            <>
              <button className="hdr-btn" title="对话历史">{IC.history()}</button>
              <button className="hdr-btn" title="分享">{IC.share()}</button>
            </>
          )}
          <div className="view-toggle">
            <button className={`view-tab${view==='chat'?' on':''}`} onClick={()=>setView('chat')}>💬 对话</button>
            <button className={`view-tab${view==='welcome'?' on':''}`} onClick={handleNew}>✦ 新对话</button>
          </div>
        </div>

        {/* Body */}
        {view==='chat' ? (
          <div className="chat-body" ref={chatBodyRef} data-screen-label="Chat View">
            <div className="msgs">
              {MSGS.map(m => <Msg key={m.id} msg={m} />)}
              <div style={{height:8}} />
            </div>
          </div>
        ) : (
          <Welcome onAction={handleAct} />
        )}

        {/* Input */}
        <ChatInput plat={plat} onPlat={setPlat} />
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
